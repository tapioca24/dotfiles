# 互換性と非推奨のためのコンフィグバージョン
# デフォルト値（キーを省略した場合）: config-version = 1
config-version = 2

# AeroSpace 起動後に実行するコマンドを追加できます。
# 使用可能なコマンド: https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = ['layout tiles', 'exec-and-forget borders']

# ログイン時に AeroSpace を起動する
start-at-login = true

# 正規化設定。参照: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# 参照: https://nikitabobko.github.io/AeroSpace/guide#layouts
# 'accordion-padding' はアコーディオンパディングのサイズを指定します
# 0 を設定するとパディング機能を無効にできます
accordion-padding = 30

# 指定可能な値: tiles|accordion
default-root-container-layout = 'tiles'

# 指定可能な値: horizontal|vertical|auto
# 'auto' の意味: 横長モニター（幅が高さより広い）は水平方向、
#               縦長モニター（高さが幅より高い）は垂直方向になります
default-root-container-orientation = 'auto'

# フォーカスされたモニターが変わったとき、マウスもフォーカスに追従します
# この動作が不要な場合はコンフィグから削除してください
# 参照: https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# 参照: https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# デフォルト値（キーを省略した場合）: on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# このフラグを切り替えることで macOS の「アプリを隠す」(cmd-h) 機能を実質的に無効にできます
# この macOS 機能を使っていないが、誤って cmd-h や cmd-alt-h を押してしまう場合に便利です
# 参照: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# ウィンドウが存在しない場合や非表示のときでも生き続けるワークスペースの一覧
# このコンフィグバージョンは 'config-version = 2' 以降で使用可能
# デフォルト値（キーを省略した場合）: persistent-workspaces = []
# persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "A", "B",
#                          "C", "D", "E", "F", "G", "I", "M", "N", "O", "P", "Q",
#                          "R", "S", "T", "U", "V", "W", "X", "Y", "Z"]
persistent-workspaces = [
  "Q",
  "W",
  "E",
  "R",
  "T",
  "Y",
  "U",
  "I",
  "O",
  "P",
  "A",
  "S",
  "D",
  "F",
  "G",
]

# バインディングモードが変わるたびに実行されるコールバック
# 参照: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 参照: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# 指定可能な値: (qwerty|dvorak|colemak)
# 参照: https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# ウィンドウ間のギャップ（inner-*）とモニター端とのギャップ（outer-*）
# 指定可能な値:
# - 固定値:           gaps.outer.top = 8
# - モニターごと:     gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                     この例では、24 はマッチするものがない場合のデフォルト値です。
#                     モニターパターンは 'workspace-to-monitor-force-assignment' と同じです。
#                     参照:
#                     https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 4
inner.vertical = 4
outer.left = 4
outer.bottom = 4
outer.top = 4
outer.right = 4

# ワークスペースをモニターに強制割り当て
# 参照: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[workspace-to-monitor-force-assignment]
Q = ["secondary", "sidecar", "built-in", "main"]
W = ["secondary", "sidecar", "built-in", "main"]
E = ["secondary", "sidecar", "built-in", "main"]
R = ["secondary", "sidecar", "built-in", "main"]
T = ["secondary", "sidecar", "built-in", "main"]
Y = ["secondary", "built-in", "main"]
U = ["secondary", "built-in", "main"]
I = ["secondary", "built-in", "main"]
O = ["secondary", "built-in", "main"]
P = ["secondary", "built-in", "main"]
A = ["main"]
S = ["main"]
D = ["main"]
F = ["main"]
G = ["main"]

# 'main' バインディングモードの宣言
# 参照: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' バインディングモードは常に存在しなければなりません
# デフォルト値（キーを省略した場合）: mode.main.binding = {}
[mode.main.binding]

# 使用可能なキー一覧:
# - 文字キー:       a, b, c, ..., z
# - 数字キー:       0, 1, 2, ..., 9
# - テンキー数字:   keypad0, keypad1, keypad2, ..., keypad9
# - Fキー:          f1, f2, ..., f20
# - 特殊キー:       minus, equal, period, comma, slash, backslash, quote, semicolon,
#                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
#                   sectionSign（ISOキーボードのみ、ヨーロッパ向けキーボードのみ）
# - テンキー特殊:   keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - 矢印キー:       left, down, up, right

# 使用可能なモディファイアキー: cmd, alt, ctrl, shift

# 使用可能なコマンド: https://nikitabobko.github.io/AeroSpace/commands

# 参照: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# 以下の行のコメントを外すと、alt + enter で（i3 のように）ターミナルを開けます
# alt-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

# 参照: https://nikitabobko.github.io/AeroSpace/commands#layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# 参照: https://nikitabobko.github.io/AeroSpace/commands#focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# 参照: https://nikitabobko.github.io/AeroSpace/commands#move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# 参照: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# 参照: https://nikitabobko.github.io/AeroSpace/commands#workspace
alt-q = "workspace Q"
alt-w = "workspace W"
alt-e = "workspace E"
alt-r = "workspace R"
alt-t = "workspace T"
alt-y = "workspace Y"
alt-u = "workspace U"
alt-i = "workspace I"
alt-o = "workspace O"
alt-p = "workspace P"
alt-a = "workspace A"
alt-s = "workspace S"
alt-d = "workspace D"
alt-f = "workspace F"
alt-g = "workspace G"

# 参照: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
alt-shift-q = "move-node-to-workspace Q"
alt-shift-w = "move-node-to-workspace W"
alt-shift-e = "move-node-to-workspace E"
alt-shift-r = "move-node-to-workspace R"
alt-shift-t = "move-node-to-workspace T"
alt-shift-y = "move-node-to-workspace Y"
alt-shift-u = "move-node-to-workspace U"
alt-shift-i = "move-node-to-workspace I"
alt-shift-o = "move-node-to-workspace O"
alt-shift-p = "move-node-to-workspace P"
alt-shift-a = "move-node-to-workspace A"
alt-shift-s = "move-node-to-workspace S"
alt-shift-d = "move-node-to-workspace D"
alt-shift-f = "move-node-to-workspace F"
alt-shift-g = "move-node-to-workspace G"

alt-shift-enter = "fullscreen"

# 参照: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
# alt-tab = 'workspace-back-and-forth'
# 参照: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# 参照: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-shift-semicolon = 'mode service'

# 'service' バインディングモードの宣言
# 参照: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']                # レイアウトをリセット
f = ['layout floating tiling', 'mode main']                # フローティングとタイリングレイアウトを切り替え
backspace = ['close-all-windows-but-current', 'mode main']

# sticky はまだサポートされていません https://github.com/nikitabobko/AeroSpace/issues/2
#s = ['layout sticky tiling', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# ウィンドウが検出されたときに実行されるコールバック
# 参照: https://nikitabobko.github.io/AeroSpace/guide#callbacks

# Typeless
[[on-window-detected]]
if.app-id = "now.typeless.desktop"
run = ["layout floating", "move-node-to-workspace G"]

# Music
[[on-window-detected]]
if.app-id = "com.apple.Music"
run = "move-node-to-workspace P"

# Slack
[[on-window-detected]]
if.app-id = "com.tinyspeck.slackmacgap"
run = "move-node-to-workspace U"

# コマンドやコールバックの環境変数を設定できます。
# 参照: https://nikitabobko.github.io/AeroSpace/guide#exec-env-vars
[exec.env-vars]
PATH = "/run/current-system/sw/bin:${PATH}"
